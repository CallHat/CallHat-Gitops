apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: callhat-app
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/CallHat/CallHat-Gitops.git
    targetRevision: main
    path: k8s
  destination:
    server: https://kubernetes.default.svc
    namespace: callhat-app
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
